services:
  - type: web
    name: fluxsentinel-backend
    runtime: python
    rootDir: backend
    buildCommand: bash ./scripts/render_build.sh
    startCommand: bash ./scripts/render_start.sh
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: MODEL_PATH
        value: ml/model.pkl
      - key: EXPOSE_INTERNAL_ERRORS
        value: "false"
      - key: PIP_REQUIRE_HASHES
        value: "0"
      - key: PIP_CONFIG_FILE
        value: /dev/null
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
